name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0" # 每周日运行

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --audit-level=high

      # Requires GitHub Dependency graph (Repo Settings → Code security → Dependency graph).
      # On forks or repos without it, the action errors; we still run pnpm audit above.
      - name: Dependency Review
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/dependency-review-action@v4

      - name: Snyk Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >
            p/typescript
            p/react
            p/owasp-top-ten
            p/jwt
            p/secrets

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  env-file-check:
    name: Env File Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Check .env not committed
        run: |
          if git ls-files | grep -E '^\.env$|^\.env\.local$|^\.env\.production$'; then
            echo "❌ .env files should not be committed!"
            exit 1
          fi
          echo "✅ No .env files committed"

  security-gate:
    name: Security Gate
    needs: [dependency-audit, codeql, semgrep, secret-scan, env-file-check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.dependency-audit.result }}" != "success" || \
                "${{ needs.codeql.result }}" != "success" || \
                "${{ needs.semgrep.result }}" != "success" || \
                "${{ needs.secret-scan.result }}" != "success" || \
                "${{ needs.env-file-check.result }}" != "success" ]]; then
            echo "❌ Security checks failed!"
            exit 1
          fi
          echo "✅ All security checks passed!"
